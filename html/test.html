<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Skill Issue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(-20deg, #616161 0%, #9bc5c3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        div {
            text-align: center;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
        }

        h1 {
            font-size: 7rem;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2), -4px -4px 0 rgba(255, 255, 255, 0.2);
            color: #fff;
            line-height: 1;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        img {
            width: 700px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Test HTML Responce</h1>
        <img src="img/skill issue.jpg" alt="Skill Issue">
        <p>Nothing to say.</p>
    </div>
</body>
</html>
