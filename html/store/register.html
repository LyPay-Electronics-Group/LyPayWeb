{% extends "base.html" %}
{% block title %}Регистрация магазина — LyPay{% endblock %}
{% block page_title %}Магазин{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px; margin: 0 auto;">
    <h2>Регистрация магазина</h2>
    {% if error %}<p style="color: var(--danger); margin-bottom: 10px;">{{ error }}</p>{% endif %}
    <form method="post">
        <div style="margin-bottom: 14px;">
            <label>Пригласительный код</label><br>
            <input name="code" required autocomplete="off"
                   style="width:100%; padding:0.7rem; border:1px solid var(--border); border-radius:10px;">
        </div>
        <button type="submit" class="btn btn-primary">Проверить</button>
    </form>
</div>
{% endblock %}
