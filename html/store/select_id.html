{% extends "base.html" %}
{% block title %}Создать магазин — LyPay{% endblock %}
{% block page_title %}Магазин{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px; margin: 0 auto;">
    <h2>Создание магазина</h2>
    {% if error %}<p style="color: var(--danger); margin-bottom: 10px;">{{ error }}</p>{% endif %}
    <form method="post">
        <div style="margin-bottom: 14px;">
            <label>ID магазина (нельзя будет изменить после выбора)</label><br>
            <select name="store_id" required style="width:100%; padding:0.7rem; border:1px solid var(--border); border-radius:10px;">
                {% for id in variants %}
                <option value="{{ id }}" {% if selected_store_id and selected_store_id == id %}selected{% endif %}>{{ id }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="margin-bottom: 14px;">
            <label>Название магазина</label><br>
            <input name="name" required
                   style="width:100%; padding:0.7rem; border:1px solid var(--border); border-radius:10px;">
        </div>
        <button type="submit" class="btn btn-success">Создать магазин</button>
    </form>

    <div class="mt-2 text-center" style="font-size:0.9rem;">
        <a href="/store/register">Назад</a>
    </div>
</div>
{% endblock %}
