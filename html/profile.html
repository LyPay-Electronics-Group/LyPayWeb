<!DOCTYPE html>
<html>
<head>
    <title>LyPay - Профиль</title>
    <style>
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ccc;
        }
        .message { color: green; margin: 10px 0; }
        .error { color: red; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Главная</a>
        <a href="/profile">Профиль</a>
        <a href="/logout">Выйти</a>
    </div>

    <h1>Профиль пользователя</h1>
    <div class="avatar-section">
        <img
            src={{ avatar }}
            alt="Аватар"
            class="avatar"
            onerror="this.src='/static/avatars/default.jpg';"
        >
        <form action="/profile/avatar" method="post" enctype="multipart/form-data" style="margin-top: 10px;">
            <input type="file" name="file" accept="image" required>
            <button type="submit">Обновить аватар</button>
        </form>
    </div>

    {% if request.query_params.message %}
    <div class="message">{{ request.query_params.message }}</div>
    {% endif %}
    {% if request.query_params.error %}
    <div class="error">{{ request.query_params.error }}</div>
    {% endif %}
    <table>
        {% for key, value in user.items() %}
        <tr>
            <th>{{ key }}</th>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
