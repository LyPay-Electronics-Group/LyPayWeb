<!DOCTYPE html>
<html>
<head>
    <title>MST Test2 – DDoS Bypass Simulation</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 30px auto; padding: 0 15px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; }
        input[type="number"] { width: 100px; padding: 5px; }
        button { padding: 7px 18px; cursor: pointer; }
        .error { color: red; }
        table { border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 5px 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="form-group">
        <label for="count">Количество запросов (1–500):</label><br>
        <input type="number" id="count" value="10" min="1" max="500">
        <button id="run-btn">Запустить тест</button>
    </div>

    <div id="status" style="margin: 10px 0;"></div>

    <div id="result-box" class="result">
        <h3>Результаты</h3>
        <p><strong>Всего запросов:</strong> <span id="total"></span></p>
        <p><strong>Успешно:</strong> <span id="success"></span></p>
        <p><strong>Потеряно:</strong> <span id="lost"></span></p>
        <p><strong>Процент потерь:</strong> <span id="loss-percent"></span>%</p>
        <p><strong>Среднее время сэмпла:</strong> <span id="avg-time"></span> мс</p>
    </div>

    <script>
        const runBtn = document.getElementById('run-btn');
        const countInput = document.getElementById('count');
        const statusDiv = document.getElementById('status');
        const resultBox = document.getElementById('result-box');

        runBtn.addEventListener('click', async () => {
            const count = parseInt(countInput.value, 10);
            if (isNaN(count) || count < 1 || count > 500) {
                alert('Введите число от 1 до 500');
                return;
            }

            runBtn.disabled = true;
            statusDiv.textContent = 'Выполняется тест...';
            resultBox.classList.remove('active');
            try {
                const formData = new FormData();
                formData.append('count', count);

                const response = await fetch('/mst/test2/run', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }

                const data = await response.json();
                displayResults(data);
                statusDiv.textContent = '';
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">ошибка ${error.message}</span>`;
            } finally {
                runBtn.disabled = false;
            }
        });

        function displayResults(data) {
            document.getElementById('total').textContent = data.total;
            document.getElementById('success').textContent = data.success;
            document.getElementById('lost').textContent = data.lost;
            document.getElementById('loss-percent').textContent = data.loss_percent;
            document.getElementById('avg-time').textContent = data.avg_time_ms;
            resultBox.classList.add('active');
        }
    </script>
</body>
</html>
