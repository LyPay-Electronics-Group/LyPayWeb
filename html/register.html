<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | LyPay</title>
</head>
<body>
    <h1>Регистрация в LyPay</h1>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if not code_sent %}
    <!-- Шаг 1: ввод email и отправка кода -->
    <form method="post" action="/register/send-code">
        <label>Email: <input type="email" name="email" required value="{{ email }}"></label><br>
        <button type="submit">Отправить код подтверждения</button>
    </form>
    {% else %}
    <!-- Шаг 2: ввод кода и остальных данных -->
    <form method="post" action="/register/verify">
        <p>Код отправлен на <strong>{{ email }}</strong></p>
        <label>Код из письма: <input type="text" name="code" required></label><br>
        <button type="submit">Зарегистрироваться</button>
    </form>
    {% endif %}

    <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
</body>
</html>
